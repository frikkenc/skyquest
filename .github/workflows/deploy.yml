name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          # Public Cloud Run URL of the Fury Registration API (Path B). Hardcoded,
          # NOT a secret, on purpose: it isn't sensitive (it's also in
          # vite.config.ts and CLAUDE.md), and when it's absent at build time the
          # prod bundle ships with BASE='' — every /api/* call then resolves
          # against the hosting origin, hits the SPA rewrite, and returns
          # index.html. res.json() chokes on "<!doctype" and the admin
          # Registrations tab shows "Could not load Fury registrations". A literal
          # can't silently go missing the way a forgotten secret can.
          VITE_FURY_API_URL: https://api-wj2a2vwtsq-uc.a.run.app
          # Brevo "Notify Me" email signup (src/components/NotifyMeModal.tsx).
          # Same CI-missing-env failure mode as Fury above — set these repo secrets
          # (Settings → Secrets → Actions) or the modal ships with an undefined key.
          VITE_BREVO_API_KEY: ${{ secrets.VITE_BREVO_API_KEY }}
          VITE_BREVO_LIST_ID: ${{ secrets.VITE_BREVO_LIST_ID }}

      - name: Deploy to Firebase Hosting (preview — PRs)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: skyquest-7cfe0
          channelId: pr-${{ github.event.pull_request.number }}

      - name: Deploy to Firebase Hosting (live — main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: skyquest-7cfe0
          channelId: live
