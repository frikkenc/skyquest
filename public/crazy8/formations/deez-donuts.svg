      <line x1="9" y1="12" x2="18" y2="20"/>
    </g>
    <!-- Grip dots for left ring -->
    <circle cx="44" cy="48" r="3" fill="#fff"/>
    <circle cx="76" cy="48" r="3" fill="#fff"/>
    <circle cx="76" cy="82" r="3" fill="#fff"/>
    <circle cx="44" cy="82" r="3" fill="#fff"/>

    <!-- RIGHT DONUT — 4 jumpers in a ring around (160,65) -->
    <g transform="translate(160,30)">
      <circle cx="0" cy="0" r="8" fill="#fff"/>
      <line x1="0" y1="8" x2="0" y2="20"/>
      <line x1="-9" y1="12" x2="-18" y2="20"/>
      <line x1="9" y1="12" x2="18" y2="20"/>
    </g>
    <g transform="translate(195,65) rotate(90)">
